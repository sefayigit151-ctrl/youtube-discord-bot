name: YouTube Discord Bot

on:
schedule:
- cron: '*/5 * * * *'
workflow_dispatch:

jobs:
run-bot:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Python Kur
    uses: actions/setup-python@v5
    with:
      python-version: '3.12'

  - name: Paketleri Kur
    run: |
      pip install feedparser requests

  - name: Botu Çalıştır
    env:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
    run: python youtube_dc.py
